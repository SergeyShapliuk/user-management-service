openapi: 3.0.0
info:
  title: API Documentation
  version: 1.0.0

security:
  - BearerAuth: []

tags:
  - name: Users
    description: API for managing users

paths:

  /api/users:
    get:
      summary: Get a paginated and sorted list of users
      tags:
        - Users
      security:
        - BearerAuth: []

      parameters:
        - name: pageNumber
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number

        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
          description: Number of items per page

        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum:
              - createdAt
              - email
            default: createdAt
          description: Field to sort by

        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort direction

        - name: searchEmailTerm
          in: query
          required: false
          schema:
            type: string
          description: Search term for user email

      responses:
        "200":
          description: List of users retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListPaginatedOutput"

        "401":
          description: Unauthorized - missing or invalid token
          content:
            text/plain:
              schema:
                type: string
                example: "Unauthorized"
            # или если возвращается пустой ответ:
            # description: No content - just status code

        "403":
          description: Forbidden - admin access required
          content:
            text/plain:
              schema:
                type: string
                example: "Forbidden"

  /api/users/{id}:
    get:
      summary: Get user by id
      tags:
        - Users
      security:
        - BearerAuth: []

      parameters:
        - name: id
          in: path
          required: true
          description: User id
          schema:
            type: string
            example: "5f1a2b3c4d5e6f7g8h9i0j1k2"

      responses:
        "200":
          description: User found successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationOutput"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorListOutput"

        "401":
          description: Unauthorized - missing or invalid token
          content:
            text/plain:
              schema:
                type: string
                example: "Unauthorized"

        "403":
          description: Forbidden - user can only access their own data
          content:
            text/plain:
              schema:
                type: string
                example: "Forbidden"

        "404":
          description: User not found
          content:
            text/plain:
              schema:
                type: string
                example: "User not found"

  /api/users/{id}/status:
    patch:
      summary: Update user status (block/unblock)
      tags:
        - Users
      security:
        - BearerAuth: []

      parameters:
        - name: id
          in: path
          required: true
          description: User id
          schema:
            type: string
            example: "5f1a2b3c4d5e6f7g8h9i0j1k2"

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdateStatusInput"

      responses:
        "204":
          description: User status updated successfully (No Content)

        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorListOutput"

        "401":
          description: Unauthorized - missing or invalid token
          content:
            text/plain:
              schema:
                type: string
                example: "Unauthorized"

        "404":
          description: User not found or trying to modify another user (as non-admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorListOutput"

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT токен авторизации.
        Получите токен через /api/auth/login и вставьте его в поле ниже.
        Формат: Bearer <token>

  schemas:

    RegistrationOutput:
      type: object
      required:
        - id
        - fullName
        - birthDate
        - email
        - role
        - isActive
        - createdAt

      properties:
        id:
          type: string
          example: "5f1a2b3c4d5e6f7g8h9i0j1k2"

        fullName:
          type: string
          example: "Ivanov Ivan Ivanovich"

        birthDate:
          type: string
          format: date
          example: "1990-01-01"

        email:
          type: string
          format: email
          example: "example@test.com"

        role:
          type: string
          enum:
            - admin
            - user
          example: "user"

        isActive:
          type: boolean
          example: true

        createdAt:
          type: string
          format: date-time
          example: "2023-03-05T12:00:00Z"

    UserListPaginatedOutput:
      type: object
      required:
        - page
        - pageSize
        - pagesCount
        - totalCount
        - items

      properties:
        page:
          type: integer
          example: 1

        pageSize:
          type: integer
          example: 10

        pagesCount:
          type: integer
          example: 3

        totalCount:
          type: integer
          example: 25

        items:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationOutput"

    UserUpdateStatusInput:
      type: object
      required:
        - isActive

      properties:
        isActive:
          type: boolean
          description: "true - unblock user, false - block user"
          example: false

    ValidationErrorOutput:
      type: object
      required:
        - status
        - detail
        - source

      properties:
        status:
          type: integer
          description: HTTP status code
          example: 400

        detail:
          type: string
          description: Error description
          example: "Invalid email format"

        source:
          type: object
          description: Source of the error
          properties:
            pointer:
              type: string
              description: Path to the field that caused the error
              example: "/email"

        code:
          type: string
          nullable: true
          description: Error code for client-side handling
          example: "INVALID_EMAIL"

    ValidationErrorListOutput:
      type: object
      required:
        - errors

      properties:
        errors:
          type: array
          description: List of validation errors
          items:
            $ref: "#/components/schemas/ValidationErrorOutput"
